//  SEED FIRESTORE
// ══════════════════════════════════════════════════════════
async function seedIfEmpty() {
  try {
    const snap = await getDoc(doc(db,'config','seeded'));
    if (snap.exists()) return;
    const batch = writeBatch(db);
    ROOMS_SEED.forEach(r  => batch.set(doc(db,'rooms',r.id), r));
    CATS_SEED.forEach(c   => batch.set(doc(db,'categories',c.id), c));
    USERS_SEED.forEach(u  => batch.set(doc(db,'users',u.uid), u));
    batch.set(doc(db,'config','wifi'),   {...WIFI_SEED, updatedAt: serverTimestamp()});
    batch.set(doc(db,'config','seeded'), {at: serverTimestamp()});
    await batch.commit();
    console.log('✅ Firestore inicializado');
  } catch(e) { console.warn('Seed:', e.message); }
}

// ══════════════════════════════════════════════════════════
//  LISTENERS EN TIEMPO REAL
// ══════════════════════════════════════════════════════════
function startListeners() {
  onSnapshot(collection(db,'rooms'), snap => {
    rooms = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>a.name.localeCompare(b.name, 'es', {numeric:true}));
    const v = getView();
    if (v==='panel') renderPanel();
    if (v==='admin-salas') renderAdminSalas();
  });
  onSnapshot(collection(db,'categories'), snap => {
    categories = snap.docs.map(d=>({id:d.id,...d.data()}));
    const v = getView();
    if (v==='admin-solicitudes') renderAdminSolicitudes();
  });
  onSnapshot(doc(db,'config','wifi'), snap => {
    if (snap.exists()) wifi = snap.data();
    const v = getView();
    if (v.startsWith('sala-')) renderSala(v.replace('sala-',''));
    if (v==='admin-wifi') renderAdminWifi();
  });
  if (unsubAlerts) unsubAlerts();
  unsubAlerts = onSnapshot(
    query(collection(db,'alerts'), orderBy('createdAt','desc')),
    snap => {
      const prev = alerts.length;
      alerts = snap.docs.map(d => {
        const data = d.data();
        return {...data, id:d.id,
          createdAt:  data.createdAt  instanceof Timestamp ? data.createdAt.toDate()  : new Date(),
          attendedAt: data.attendedAt instanceof Timestamp ? data.attendedAt.toDate() : null,
          completedAt:data.completedAt instanceof Timestamp ? data.completedAt.toDate(): null,
        };
      });
      if (alerts.length > prev && prev > 0) playBeep();
      const v = getView();
      if (v==='panel') renderPanel();
      if (v==='reportes') renderReportes();
    }
  );
}

// ══════════════════════════════════════════════════════════
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o1=ctx.createOscillator(), o2=ctx.createOscillator(), g=ctx.createGain();
    o1.frequency.value=880; o2.frequency.value=1100;
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
    o1.start(); o1.stop(ctx.currentTime+.2);
    o2.start(ctx.currentTime+.25); o2.stop(ctx.currentTime+.55);
  } catch(e){}
}

function getView() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('sala')) return 'sala-'+p.get('sala');
  return p.get('view') || 'auto';
}

function navigate(view, extra) {
  window.history.pushState({}, '', '?' + (extra || 'view='+view));
  route();
}

function route() {
  const v = getView();
  const p = new URLSearchParams(window.location.search);
  if (p.get('sala')) { renderSala(p.get('sala')); return; }
  if (!currentUser)  { renderLogin(); return; }
  if (v==='panel'    || v==='auto')         { renderPanel(); return; }
  if (v==='reportes')                        { renderReportes(); return; }
  if (v==='admin-salas')                     { renderAdminSalas(); return; }
  if (v==='admin-solicitudes')               { renderAdminSolicitudes(); return; }
  if (v==='admin-wifi')                      { renderAdminWifi(); return; }
  if (v==='admin-usuarios')                  { renderAdminUsuarios(); return; }
  renderPanel();
}

window.nav = v => navigate(v);
window.addEventListener('popstate', route);

function getRoomBySlug(slug) {
  return rooms.find(r => r.urlSlug===slug || r.id===slug || r.id==='sala-'+slug) || null;
}

      </div>`;
    return;
  }

  const isDir  = room.type === 'directorio';
  const cats   = categories.filter(c => isDir ? c.directorioVisible : true);
  const high   = cats.filter(c=>c.priority==='high');
  const medium = cats.filter(c=>c.priority==='medium');
  const low    = cats.filter(c=>c.priority==='low');

  const bl = {high:'border-l-[3px] border-l-[#ff6751]', medium:'border-l-[3px] border-l-[#ffbc54]', low:'border-l-[3px] border-l-[#00c0d0]'};

  function btn(cat, label, icon, itemId) {
    return `<button onclick="sendReq('${room.id}','${room.name.replace(/'/g,"\\'")}','${room.type}','${cat.id}','${cat.name.replace(/'/g,"\\'")}','${label.replace(/'/g,"\\'")}','${cat.priority}')"
      class="bg-white/[0.13] border border-white/[0.22] ${bl[cat.priority]} rounded-xl p-2.5 flex flex-col items-center gap-1 min-h-[66px] transition-all hover:bg-white cursor-pointer group">
      <span class="text-[20px] leading-none">${icon}</span>
      <span class="text-[11px] font-semibold text-white group-hover:text-slate-800 text-center leading-tight transition-colors">${label}</span>
      ${cat.note?`<span class="text-[9px] text-white/55 group-hover:text-slate-400">(${cat.note})</span>`:''}
      ${cat.onlyDays?`<span class="text-[9px] text-white/55 group-hover:text-slate-400">(${cat.onlyDays})</span>`:''}
    </button>`;
  }

  function catGroup(cat) {
    const isExpandable = !isDir && cat.subitems && cat.subitems.length > 1 && cat.id !== 'bocaditos';

window.sendReq = async function(roomId, roomName, roomType, catId, catName, itemName, priority) {

//  PANEL OPERATIVO
// ══════════════════════════════════════════════════════════
const sLabel = {pending:'Pendiente',attending:'En Atención',attended:'Atendida'};
const sStyle = {pending:'bg-orange-50 text-orange-700',attending:'bg-blue-50 text-blue-700',attended:'bg-green-50 text-green-700'};
const pLabel = {high:'Alta',medium:'Media',low:'Baja'};
const pStyle = {high:'bg-red-50 text-[#ff6751]',medium:'bg-yellow-50 text-yellow-700',low:'bg-teal-50 text-teal-700'};
const bLeft  = {high:'border-l-4 border-l-[#ff6751]',medium:'border-l-4 border-l-[#ffbc54]',low:'border-l-4 border-l-[#00c0d0]'};

function renderPanel() {
  const pend = alerts.filter(a=>a.status==='pending').length;
  const att  = alerts.filter(a=>a.status==='attending').length;
  const done = alerts.filter(a=>a.status==='attended').length;
  const high = alerts.filter(a=>a.priority==='high'&&a.status==='pending').length;

  let data = panelFilter==='all' ? alerts : alerts.filter(a=>a.status===panelFilter);
  data = [...data].sort((a,b)=>{
    const po={high:0,medium:1,low:2}, so={pending:0,attending:1,attended:2};
    if(so[a.status]!==so[b.status]) return so[a.status]-so[b.status];
    return po[a.priority]-po[b.priority];
  });

  const fBtn = (v,l,c) => `<button onclick="setPFilter('${v}')" class="text-xs font-medium px-4 py-1.5 rounded-full border transition-colors ${panelFilter===v?'bg-[#0041a3] border-[#0041a3] text-white':'bg-white border-slate-200 text-slate-500 hover:border-[#0041a3] hover:text-[#0041a3]'}">${l} (${c})</button>`;

  const cards = data.length===0
    ? `<div class="col-span-full text-center py-16 text-slate-300"><div class="text-5xl mb-3">✓</div><p class="text-sm">No hay solicitudes activas</p></div>`
    : data.map(a=>{
        const isNew = a.status==='pending' && Date.now()-a.createdAt.getTime()<15000;
        return `
        <div class="bg-white rounded-xl border border-slate-100 ${bLeft[a.priority]} p-4 relative hover:shadow-md transition-all">
          ${isNew?'<span class="absolute top-3 right-3 w-2 h-2 bg-[#ff6751] rounded-full pulse-red"></span>':''}
          <div class="flex justify-between items-start mb-2">
            <span class="font-bold text-[#00164f] text-sm">${a.roomName}</span>
            <span class="text-xs text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">${fmtTime(a.createdAt)}</span>
          </div>
          <p class="font-semibold text-slate-800 text-sm mb-1">${a.itemName}</p>
          <p class="text-xs text-slate-400 mb-3">${a.categoryName}</p>
          <div class="flex items-center justify-between">
            <div class="flex gap-1.5 flex-wrap">
              <span class="text-[11px] font-semibold px-2 py-0.5 rounded-lg ${sStyle[a.status]}">${sLabel[a.status]}</span>
              <span class="text-[10px] font-semibold px-2 py-0.5 rounded-lg ${pStyle[a.priority]}">${pLabel[a.priority]}</span>
            </div>
            <div class="flex gap-1.5">
              ${a.status==='pending'  ?`<button onclick="setStatus('${a.id}','attending')" class="bg-[#0041a3] text-white text-[11px] font-semibold px-3 py-1 rounded-lg hover:bg-blue-800">Atender</button>`:''}
              ${a.status==='attending'?`<button onclick="setStatus('${a.id}','attended')"  class="bg-green-50 text-green-700 border border-green-200 text-[11px] font-semibold px-3 py-1 rounded-lg hover:bg-green-100">✓ Listo</button>`:''}
            </div>
          </div>
        </div>`}).join('');

  document.getElementById('app').innerHTML = withSidebar('panel', `
    <div class="p-6">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 class="text-xl font-bold text-[#00164f]">Panel Operativo</h1>
          <p class="text-xs text-slate-400 mt-0.5">${new Date().toLocaleString('es-PE',{weekday:'long',hour:'2-digit',minute:'2-digit'})} · <span class="text-green-600">● En vivo</span></p>
        </div>
        <button onclick="clearAttended()" class="text-xs font-semibold px-3 py-1.5 bg-orange-50 border border-orange-200 text-orange-600 rounded-full hover:bg-orange-100">Limpiar atendidas</button>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
        ${[['Pendientes',pend,'text-[#ff8c42]'],['En Atención',att,'text-[#0041a3]'],['Atendidas',done,'text-[#00c0d0]'],['Alta Prioridad',high,'text-[#ff6751]']].map(([l,v,c])=>`
          <div class="bg-white rounded-xl border border-slate-100 p-4">
            <p class="text-[11px] text-slate-400 font-medium uppercase tracking-wide mb-1">${l}</p>
            <p class="text-3xl font-bold ${c}">${v}</p>
          </div>`).join('')}
      </div>
      <div class="flex gap-2 mb-4 flex-wrap">
        ${fBtn('all','Todas',alerts.length)}
        ${fBtn('pending','Pendientes',pend)}
        ${fBtn('attending','En Atención',att)}
        ${fBtn('attended','Atendidas',done)}
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">${cards}</div>
    </div>`);
}

window.setPFilter = v => { panelFilter=v; renderPanel(); };
window.setStatus  = async function(id, status) {
  const u = {status};
  if (status==='attending') u.attendedAt  = serverTimestamp();
  if (status==='attended')  u.completedAt = serverTimestamp();
  await updateDoc(doc(db,'alerts',id), u);
};
window.clearAttended = () => {
  alerts.filter(a=>a.status==='attended').forEach(a=>updateDoc(doc(db,'alerts',a.id),{_cleared:true}));
};

// ══════════════════════════════════════════════════════════
//  REPORTES
// ══════════════════════════════════════════════════════════
function renderReportes() {
  const cutoff = reportRange==='7d' ? 7 : reportRange==='30d' ? 30 : 9999;
  const since  = new Date(Date.now() - cutoff*86400000);
  let data     = alerts.filter(a=>a.createdAt>=since);
  if (reportRoom!=='all') data = data.filter(a=>a.roomId===reportRoom);

  const high = data.filter(a=>a.priority==='high').length;
  const rate = data.length ? Math.round(data.filter(a=>a.status==='attended').length/data.length*100) : 0;

  const attTimes = data.filter(a=>a.attendedAt&&a.createdAt).map(a=>(a.attendedAt.getTime()-a.createdAt.getTime())/60000);
  const avgTime  = attTimes.length ? Math.round(attTimes.reduce((s,v)=>s+v,0)/attTimes.length) : null;

  const trend = Array.from({length:7},(_,i)=>{
    const d  = new Date(Date.now()-(6-i)*86400000);
    const ds = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    const day = data.filter(a=>fmtDate(a.createdAt)===ds);
    return {label:ds, total:day.length, high:day.filter(a=>a.priority==='high').length};
  });

  // Por sala
  const bySala = {};
  data.forEach(a=>{bySala[a.roomName]=(bySala[a.roomName]||0)+1;});
  const salaArr = Object.entries(bySala).sort((a,b)=>b[1]-a[1]);

  // Por ítem top 10
  const byItem = {};
  data.forEach(a=>{byItem[a.itemName]=(byItem[a.itemName]||0)+1;});
  const itemArr = Object.entries(byItem).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxItem = itemArr[0]?.[1]||1;

  // Por sala detalle (para tabla)
  const bySalaDetail = {};
  data.forEach(a=>{
    if(!bySalaDetail[a.roomName]) bySalaDetail[a.roomName]={total:0,pending:0,attending:0,attended:0};
    bySalaDetail[a.roomName].total++;
    bySalaDetail[a.roomName][a.status]++;
  });

  const rBtn = (v,l) => `<button onclick="setRRange('${v}')" class="text-xs font-medium px-3 py-1.5 rounded-full border transition-colors ${reportRange===v?'bg-[#0041a3] border-[#0041a3] text-white':'bg-white border-slate-200 text-slate-500 hover:border-[#0041a3]'}">${l}</button>`;
  const roomOpts = rooms.map(r=>`<option value="${r.id}" ${reportRoom===r.id?'selected':''}>${r.name}</option>`).join('');

  document.getElementById('app').innerHTML = withSidebar('reportes', `
    <div class="p-6 space-y-5">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <h1 class="text-xl font-bold text-[#00164f]">Reportes y Analítica</h1>
        <div class="flex gap-2 flex-wrap items-center">
          ${rBtn('7d','Últimos 7 días')}${rBtn('30d','Últimos 30 días')}${rBtn('all','Todo')}
          <select onchange="setRRoom(this.value)" class="text-xs border border-slate-200 rounded-full px-3 py-1.5 bg-white text-slate-600 focus:outline-none focus:border-[#0041a3]">
            <option value="all">Todas las salas</option>${roomOpts}
          </select>
        </div>
      </div>
      <!-- KPIs -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        ${[['Total solicitudes',data.length,'text-[#0041a3]'],['Alta prioridad',high,'text-[#ff6751]'],['Tasa de atención',rate+'%','text-[#00c0d0]'],['Tiempo prom.',avgTime!==null?avgTime+' min':'—','text-[#ff8c42]']].map(([l,v,c])=>`
          <div class="bg-white rounded-xl border border-slate-100 p-4">
            <p class="text-[11px] text-slate-400 font-medium uppercase tracking-wide mb-1">${l}</p>
            <p class="text-2xl font-bold ${c}">${v}</p>
          </div>`).join('')}
      </div>
      <!-- Tendencia -->
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <h2 class="text-sm font-bold text-[#00164f] mb-4">Tendencia diaria</h2>
        <canvas id="cTrend" height="80"></canvas>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <!-- Por sala barra -->
        <div class="bg-white rounded-xl border border-slate-100 p-5">
          <h2 class="text-sm font-bold text-[#00164f] mb-4">Solicitudes por sala</h2>
          ${salaArr.length?'<canvas id="cSala" height="160"></canvas>':'<p class="text-slate-300 text-sm text-center py-8">Sin datos</p>'}
        </div>
        <!-- Top ítems -->
        <div class="bg-white rounded-xl border border-slate-100 p-5">
          <h2 class="text-sm font-bold text-[#00164f] mb-4">Top solicitudes frecuentes</h2>
          ${itemArr.length===0?'<p class="text-slate-300 text-sm text-center py-8">Sin datos</p>':
            itemArr.map(([name,v],i)=>`
              <div class="flex items-center gap-2 mb-2">
                <span class="text-[10px] text-slate-400 w-4">${i+1}</span>
                <span class="text-xs text-slate-600 w-36 truncate">${name}</span>
                <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                  <div class="h-full rounded-full bg-[#0041a3]" style="width:${Math.round(v/maxItem*100)}%"></div>
                </div>
                <span class="text-xs font-semibold text-[#0041a3] w-5 text-right">${v}</span>
              </div>`).join('')}
        </div>
      </div>
      <!-- Comportamiento por sala -->
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <h2 class="text-sm font-bold text-[#00164f] mb-4">Comportamiento por sala</h2>
        ${Object.keys(bySalaDetail).length===0?'<p class="text-slate-300 text-sm text-center py-6">Sin datos</p>':`
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead><tr class="bg-slate-50">
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Sala</th>
              <th class="text-right px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Total</th>
              <th class="text-right px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Pendientes</th>
              <th class="text-right px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">En Atención</th>
              <th class="text-right px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Atendidas</th>
              <th class="text-right px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">% Atendido</th>
            </tr></thead>
            <tbody>
              ${Object.entries(bySalaDetail).sort((a,b)=>b[1].total-a[1].total).map(([sala,d])=>`
                <tr class="border-t border-slate-50 hover:bg-slate-50">
                  <td class="px-3 py-2 font-medium text-[#00164f]">${sala}</td>
                  <td class="px-3 py-2 text-right font-bold text-[#0041a3]">${d.total}</td>
                  <td class="px-3 py-2 text-right text-orange-600">${d.pending}</td>
                  <td class="px-3 py-2 text-right text-blue-600">${d.attending}</td>
                  <td class="px-3 py-2 text-right text-green-600">${d.attended}</td>
                  <td class="px-3 py-2 text-right font-semibold">${d.total?Math.round(d.attended/d.total*100):0}%</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
      <!-- Historial -->
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <h2 class="text-sm font-bold text-[#00164f] mb-4">Historial detallado</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead><tr class="bg-slate-50">
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Sala</th>
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Solicitud</th>
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Categoría</th>
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Hora</th>
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Estado</th>
              <th class="text-left px-3 py-2 text-slate-500 font-semibold uppercase tracking-wide">Prioridad</th>
            </tr></thead>
            <tbody>
              ${data.slice(0,50).map(a=>`
                <tr class="border-t border-slate-50 hover:bg-slate-50">
                  <td class="px-3 py-2 font-medium text-[#00164f]">${a.roomName}</td>
                  <td class="px-3 py-2 text-slate-700">${a.itemName}</td>
                  <td class="px-3 py-2 text-slate-500">${a.categoryName}</td>
                  <td class="px-3 py-2 text-slate-400">${fmtDateTime(a.createdAt)}</td>
                  <td class="px-3 py-2"><span class="px-2 py-0.5 rounded-lg font-semibold ${sStyle[a.status]}">${sLabel[a.status]}</span></td>
                  <td class="px-3 py-2"><span class="px-2 py-0.5 rounded-lg font-semibold ${pStyle[a.priority]}">${pLabel[a.priority]}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
          ${data.length>50?`<p class="text-xs text-slate-400 text-center mt-3">Mostrando 50 de ${data.length}</p>`:''}
        </div>
      </div>
    </div>`);

  requestAnimationFrame(() => {
    if (chartTrend) chartTrend.destroy();
    if (chartSala)  chartSala.destroy();
    const c1 = document.getElementById('cTrend');
    if (c1) chartTrend = new Chart(c1, {
      type:'line',
      data:{labels:trend.map(t=>t.label), datasets:[
        {label:'Total',data:trend.map(t=>t.total),borderColor:'#0041a3',backgroundColor:'#0041a320',tension:.4,fill:true},
        {label:'Alta', data:trend.map(t=>t.high), borderColor:'#ff6751',backgroundColor:'transparent',tension:.4},
      ]},
      options:{responsive:true,plugins:{legend:{labels:{font:{family:'Sora',size:11}}}},
        scales:{x:{ticks:{font:{family:'Sora',size:10}}},y:{ticks:{font:{family:'Sora',size:10}}}}}
    });
    const c2 = document.getElementById('cSala');
    if (c2 && salaArr.length) chartSala = new Chart(c2, {
      type:'bar',
      data:{labels:salaArr.map(([k])=>k.replace('Directorio','Dir.')), datasets:[{label:'Solicitudes',data:salaArr.map(([,v])=>v),backgroundColor:'#0041a3',borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
        scales:{x:{ticks:{font:{family:'Sora',size:10}}},y:{ticks:{font:{family:'Sora',size:10}}}}}
    });
  });
}

window.setRRange = v => { reportRange=v; renderReportes(); };
window.setRRoom  = v => { reportRoom=v;  renderReportes(); };

                <td class="px-4 py-3"><code class="text-xs bg-slate-100 px-2 py-1 rounded text-[#0041a3]">?sala=${r.urlSlug}</code></td>
                <td class="px-4 py-3"><button onclick="showQR('${r.urlSlug}','${r.name.replace(/'/g,"\\'")}','${base}')" class="bg-[#00164f] text-white text-xs px-3 py-1.5 rounded-lg hover:bg-[#0041a3] transition-colors">🔲 Ver QR</button></td>
                <td class="px-4 py-3"><span class="text-xs font-semibold px-3 py-1 rounded-full ${r.active?'bg-green-50 text-green-700':'bg-slate-100 text-slate-400'}">${r.active?'Activa':'Inactiva'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `);

  // Modal QR (fuera del sidebar)
  if (!document.getElementById('qrModal')) {
    const m = document.createElement('div');
    m.id = 'qrModal';
    m.className = 'hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4';
    m.innerHTML = `
      <div class="bg-white rounded-2xl p-8 max-w-xs w-full text-center shadow-2xl">
        <h2 id="qrTitle" class="text-lg font-bold text-[#00164f] mb-1"></h2>
        <p id="qrUrlTxt" class="text-xs text-slate-400 mb-5 break-all"></p>
        <img id="qrImg" class="mx-auto mb-5 w-48 h-48" src="" alt="QR">
        <button onclick="document.getElementById('qrModal').classList.add('hidden')" class="w-full bg-[#0041a3] text-white text-sm font-semibold py-2.5 rounded-xl hover:bg-blue-800">Cerrar</button>
      </div>`;
    document.body.appendChild(m);
  }
}

window.showQR = function(slug, name, base) {
  const realBase = document.getElementById('baseUrl')?.value || base;
  const url = `${realBase}?sala=${slug}`;
  document.getElementById('qrTitle').textContent  = name;
  document.getElementById('qrUrlTxt').textContent = url;
  document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&color=00164f`;
  document.getElementById('qrModal').classList.remove('hidden');
};

window.saveWifi = async function() {
  const ssid=document.getElementById('wSsid').value, user=document.getElementById('wUser').value, password=document.getElementById('wPass').value;
  const btn=document.getElementById('wBtn');
  await updateDoc(doc(db,'config','wifi'), {ssid,user,password,updatedAt:serverTimestamp()});
  btn.textContent='✓ Guardado'; btn.classList.replace('bg-[#0041a3]','bg-green-500');
  setTimeout(()=>{btn.textContent='Guardar cambios'; btn.classList.replace('bg-green-500','bg-[#0041a3]');},3000);
};

function renderAdminSolicitudes() {
  const rows = categories.flatMap(cat=>
    (cat.subitems&&cat.subitems.length>0?cat.subitems:[null]).map(item=>({cat,item}))
  ).map(({cat,item})=>`
    <tr class="border-t border-slate-50 hover:bg-slate-50">
      <td class="px-4 py-2.5 text-lg">${item?.icon||cat.icon}</td>
      <td class="px-4 py-2.5 text-slate-500 text-xs">${cat.name}</td>
      <td class="px-4 py-2.5 font-medium text-[#00164f]">${item?.name||cat.name}</td>
      <td class="px-4 py-2.5"><span class="text-xs font-semibold px-2 py-0.5 rounded-lg ${pStyle[cat.priority]}">${pLabel[cat.priority]}</span></td>
      <td class="px-4 py-2.5 text-xs text-slate-400">${cat.note||cat.onlyDays||'—'}</td>
      <td class="px-4 py-2.5">
        ${!item?`<button onclick="toggleDirVis('${cat.id}',${!cat.directorioVisible})"
          class="text-xs font-semibold px-3 py-1 rounded-full transition-colors ${cat.directorioVisible?'bg-green-50 text-green-700':'bg-slate-100 text-slate-400'}">
          ${cat.directorioVisible?'✓ Sí':'No'}
        </button>`:''}

  document.getElementById('app').innerHTML = withSidebar('admin-solicitudes', `
    <div class="p-6">
      <h1 class="text-xl font-bold text-[#00164f] mb-1">Tipos de Solicitud</h1>
      <p class="text-xs text-slate-400 mb-6">Controla qué opciones son visibles en Directorios.</p>
      <div class="bg-white rounded-xl border border-slate-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="bg-slate-50">
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Icono</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Categoría</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Solicitud</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Prioridad</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Nota</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Visible Directorio</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="mt-4 bg-blue-50 border border-blue-100 rounded-xl p-4 text-xs text-blue-700">

}

window.toggleDirVis = async (id,val) => await updateDoc(doc(db,'categories',id),{directorioVisible:val});

// ══════════════════════════════════════════════════════════
//  ADMIN: USUARIOS
// ══════════════════════════════════════════════════════════
function renderAdminUsuarios() {
  if (unsubUsers) unsubUsers();
  unsubUsers = onSnapshot(collection(db,'users'), snap => {
    adminUsers = snap.docs.map(d=>({uid:d.id,...d.data()}));
    renderAdminUsuariosContent();
  });
}

function renderAdminUsuariosContent() {
  const roleStyle = {mozo:'bg-blue-50 text-blue-700',recepcion:'bg-purple-50 text-purple-700',admin:'bg-orange-50 text-orange-700'};
  const rows = adminUsers.map(u=>`
    <tr class="border-t border-slate-50 hover:bg-slate-50">
      <td class="px-4 py-3 font-medium text-[#00164f]">${u.displayName||'—'}</td>
      <td class="px-4 py-3 text-slate-500 text-xs">${u.email}</td>
      <td class="px-4 py-3">
        <select onchange="changeRole('${u.uid}',this.value)" class="text-xs font-semibold px-2 py-1 rounded-lg border-0 focus:outline-none cursor-pointer ${roleStyle[u.role]||'bg-slate-50 text-slate-600'}">
          <option value="mozo"      ${u.role==='mozo'?'selected':''}>Mozo</option>
          <option value="recepcion" ${u.role==='recepcion'?'selected':''}>Recepción</option>
          <option value="admin"     ${u.role==='admin'?'selected':''}>Admin</option>
        </select>
      </td>
      <td class="px-4 py-3"><span class="text-xs font-semibold px-2 py-0.5 rounded-full ${u.active?'bg-green-50 text-green-700':'bg-slate-100 text-slate-400'}">${u.active?'Activo':'Inactivo'}</span></td>
      <td class="px-4 py-3"><button onclick="toggleActive('${u.uid}',${!u.active})" class="text-xs text-slate-400 hover:text-[#0041a3] underline">${u.active?'Desactivar':'Activar'}</button></td>
    </tr>`).join('');

  document.getElementById('app').innerHTML = withSidebar('admin-usuarios', `
    <div class="p-6">
      <h1 class="text-xl font-bold text-[#00164f] mb-1">Usuarios del sistema</h1>
      <p class="text-xs text-slate-400 mb-6">Para crear nuevos usuarios: Firebase Console → Authentication → Add user.</p>
      <div class="bg-white rounded-xl border border-slate-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="bg-slate-50">
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Nombre</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Email</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Rol</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Estado</th>
            <th class="text-left px-4 py-3 text-slate-500 font-semibold text-xs uppercase tracking-wide">Acción</th>
          </tr></thead>
          <tbody>${rows||'<tr><td colspan="5" class="px-4 py-8 text-center text-slate-300 text-xs">Sin usuarios</td></tr>'}</tbody>
        </table>
      </div>
      <div class="mt-4 bg-blue-50 border border-blue-100 rounded-xl p-4 text-xs text-blue-700 space-y-1">
        <p><strong>Para agregar un nuevo mozo o recepcionista:</strong></p>
        <p>1. Firebase Console → Authentication → Add user (email + contraseña)</p>
        <p>2. Firestore → users → nuevo documento con ID = UID → campos: displayName, email, role, active:true</p>
      </div>
    </div>`);
}

window.changeRole   = async (uid,role)  => await updateDoc(doc(db,'users',uid),{role});
window.toggleActive = async (uid,val)   => await updateDoc(doc(db,'users',uid),{active:val});

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════
function fmtTime(d)     { return d?d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}):'--:--'; }
function fmtDate(d)     { return d?`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`:''; }
function fmtDateTime(d) { return d?`${fmtDate(d)} ${fmtTime(d)}`:'—'; }

// ══════════════════════════════════════════════════════════
//  ARRANQUE
// ══════════════════════════════════════════════════════════
const urlSala = new URLSearchParams(window.location.search).get('sala');

if (urlSala) {
  // Vista pública de sala — sin login
  await seedIfEmpty();
  startListeners();
  renderSala(urlSala);
} else {
  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      const snap  = await getDoc(doc(db,'users',user.uid));
      currentUserRole = snap.exists() ? snap.data().role : 'recepcion';
      await seedIfEmpty();
      startListeners();
    } else {
      currentUser = null;
      currentUserRole = null;
    }
    route();
  });
}
</script>
